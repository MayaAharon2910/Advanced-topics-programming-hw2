# Benchmark map scenario: complex 3-story house (29x30x31 cm)
# Run manually: ./drone_mapper_simulation complex_scenario/composition.yaml
simulation_compositions:
  simulations:
    - simulation_config: "simulation_config.yaml"
      mission_configs:
        - "mission_config.yaml"
  drone_configs:
    - "drones/drone_large.yaml"
    - "drones/drone_medium.yaml"
    - "drones/drone_small.yaml"
    - "drones/drone_tiny.yaml"
  lidar_configs:
    - "lidars/lidar_standard.yaml"
