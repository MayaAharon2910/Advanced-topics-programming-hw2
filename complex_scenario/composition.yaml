# Benchmark map scenario: complex 3-story house (29x30x31 cm)
# Tests drone collision detection with entrance sizes:
#   - Main entrance:   4×4 voxels → drone_large (r=1.8) can enter
#   - 2nd floor room:  3-wide gap  → drone_medium (r=1.3) can enter
#   - Roof entrance:   2-wide gap  → drone_small (r=0.8) can enter
#   - All areas:       drone_tiny (r=0.3) can access everything
#
# Run manually: ./drone_mapper_simulation complex_scenario/composition.yaml
simulation_compositions:
  simulations:
    - simulation_config: "complex_scenario/simulation_config.yaml"
      mission_configs:
        - "complex_scenario/mission_config.yaml"
  drone_configs:
    - "complex_scenario/drones/drone_large.yaml"
    - "complex_scenario/drones/drone_medium.yaml"
    - "complex_scenario/drones/drone_small.yaml"
    - "complex_scenario/drones/drone_tiny.yaml"
  lidar_configs:
    - "complex_scenario/lidars/lidar_standard.yaml"
